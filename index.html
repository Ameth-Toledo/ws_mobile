<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WS Chat — Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      width: 100%;
      max-width: 520px;
      overflow: hidden;
    }

    .card-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-header h1 {
      font-size: 15px;
      font-weight: 500;
      color: #111;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      display: inline-block;
      margin-right: 6px;
    }
    .status-dot.connected { background: #22c55e; }
    .status-dot.connecting { background: #f59e0b; }
    .status-dot.error { background: #ef4444; }

    .status-label {
      font-size: 13px;
      color: #888;
      display: flex;
      align-items: center;
    }

    .connect-section {
      padding: 1.25rem;
      display: flex;
      gap: 8px;
    }

    .connect-section input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .connect-section input:focus { border-color: #a5b4fc; }

    button {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #ddd;
      background: #fff;
      color: #333;
      transition: background 0.15s;
    }
    button:hover { background: #f0f0f0; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    button.primary {
      background: #111;
      color: #fff;
      border-color: #111;
    }
    button.primary:hover { background: #333; }

    button.danger {
      background: #fee2e2;
      color: #b91c1c;
      border-color: #fca5a5;
    }
    button.danger:hover { background: #fecaca; }

    .messages {
      height: 280px;
      overflow-y: auto;
      padding: 1rem 1.25rem;
      border-top: 1px solid #e0e0e0;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #fafafa;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .msg-meta {
      font-size: 11px;
      color: #aaa;
    }

    .msg-bubble {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 13px;
      max-width: 85%;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg.own { align-items: flex-end; }
    .msg.own .msg-bubble { background: #111; color: #fff; }
    .msg.other .msg-bubble { background: #e5e7eb; color: #111; }
    .msg.system { align-items: center; }
    .msg.system .msg-bubble {
      background: transparent;
      color: #aaa;
      font-size: 12px;
      padding: 2px 8px;
    }
    .msg.history .msg-bubble { background: #ede9fe; color: #4c1d95; }

    .send-section {
      padding: 1rem 1.25rem;
      display: flex;
      gap: 8px;
    }

    .send-section input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .send-section input:focus { border-color: #a5b4fc; }

    .empty-state {
      color: #ccc;
      font-size: 13px;
      text-align: center;
      margin: auto;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <h1>WebSocket Chat — Test</h1>
    <span class="status-label">
      <span class="status-dot" id="dot"></span>
      <span id="status-text">desconectado</span>
    </span>
  </div>

  <div class="connect-section">
    <input type="text" id="username" placeholder="Tu nombre de usuario" maxlength="40" />
    <input type="text" id="wsUrl" value="ws://54.163.40.233:3000/chat" style="max-width:200px;" />
    <button class="primary" id="btn-connect">Conectar</button>
    <button class="danger" id="btn-disconnect" style="display:none;">Salir</button>
  </div>

  <div class="messages" id="messages">
    <p class="empty-state">Conéctate para ver los mensajes</p>
  </div>

  <div class="send-section">
    <input type="text" id="msg-input" placeholder="Escribe un mensaje..." disabled />
    <button class="primary" id="btn-send" disabled>Enviar</button>
  </div>
</div>

<script>
  let ws = null
  let myUsername = ''

  const dot = document.getElementById('dot')
  const statusText = document.getElementById('status-text')
  const messagesEl = document.getElementById('messages')
  const usernameInput = document.getElementById('username')
  const wsUrlInput = document.getElementById('wsUrl')
  const msgInput = document.getElementById('msg-input')
  const btnConnect = document.getElementById('btn-connect')
  const btnDisconnect = document.getElementById('btn-disconnect')
  const btnSend = document.getElementById('btn-send')

  function setStatus(state) {
    dot.className = 'status-dot ' + state
    const labels = { connected: 'conectado', connecting: 'conectando...', error: 'error', '': 'desconectado' }
    statusText.textContent = labels[state] || 'desconectado'
  }

  function addMessage(msg, isOwn = false, isHistory = false) {
    const empty = messagesEl.querySelector('.empty-state')
    if (empty) empty.remove()

    const div = document.createElement('div')

    if (msg.type === 'system') {
      div.className = 'msg system'
      div.innerHTML = `<span class="msg-bubble">${escHtml(msg.content)}</span>`
    } else {
      const cls = isHistory ? 'history' : (isOwn ? 'own' : 'other')
      div.className = `msg ${cls}`
      const time = new Date(msg.timestamp).toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' })
      div.innerHTML = `
        <span class="msg-meta">${escHtml(msg.username)} · ${time}${isHistory ? ' · historial' : ''}</span>
        <span class="msg-bubble">${escHtml(msg.content)}</span>
      `
    }

    messagesEl.appendChild(div)
    messagesEl.scrollTop = messagesEl.scrollHeight
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }

  function connect() {
    const username = usernameInput.value.trim()
    if (!username) { usernameInput.focus(); return }

    const url = wsUrlInput.value.trim()
    myUsername = username
    setStatus('connecting')

    ws = new WebSocket(url)

    ws.onopen = () => {
      setStatus('connected')
      msgInput.disabled = false
      btnSend.disabled = false
      btnConnect.style.display = 'none'
      btnDisconnect.style.display = ''
      usernameInput.disabled = true
      wsUrlInput.disabled = true
      msgInput.focus()
    }

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data)

      if (data.type === 'history') {
        data.messages.forEach(m => addMessage(m, m.username === myUsername, true))
        return
      }

      if (data.type === 'error') {
        addMessage({ type: 'system', content: '⚠ ' + data.content, timestamp: new Date().toISOString() })
        return
      }

      addMessage(data, data.username === myUsername)
    }

    ws.onclose = () => {
      setStatus('')
      reset()
    }

    ws.onerror = () => {
      setStatus('error')
      reset()
    }
  }

  function disconnect() {
    if (ws) ws.close()
  }

  function reset() {
    msgInput.disabled = true
    btnSend.disabled = true
    btnConnect.style.display = ''
    btnDisconnect.style.display = 'none'
    usernameInput.disabled = false
    wsUrlInput.disabled = false
    ws = null
  }

  function sendMessage() {
    const content = msgInput.value.trim()
    if (!content || !ws || ws.readyState !== WebSocket.OPEN) return
    ws.send(JSON.stringify({ username: myUsername, content }))
    msgInput.value = ''
    msgInput.focus()
  }

  btnConnect.addEventListener('click', connect)
  btnDisconnect.addEventListener('click', disconnect)
  btnSend.addEventListener('click', sendMessage)
  msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage() })
  usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') connect() })
</script>

</body>
</html>
